name: Build

on:
    push:
        branches-ignore:
            - 'dependabot/**'
        paths-ignore:
            - "*.md"
    pull_request:
        paths-ignore:
            - "*.md"
    release:
        types: [created]
    schedule:
        -
            cron: "0 1 * * 6"
    workflow_dispatch: ~

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    tests:
        runs-on: ubuntu-latest

        name: "Sylius ${{ matrix.sylius }}, PHP ${{ matrix.php }}, Symfony ${{ matrix.symfony }}, ${{ matrix.database }}"

        strategy:
            fail-fast: false
            matrix:
                php: ["8.2", "8.3", "8.4"]
                symfony: ["^7.4"]
                sylius: ["~2.0.0", "~2.1.0", "~2.2.0"]
                database: ["postgres:17"]
                node: ["22.x"]

                exclude:
                    - sylius: "~2.0.0"
                      symfony: "^7.4"

                include:
                    - php: "8.5"
                      symfony: "^7.4"
                      sylius: "~2.2.0"
                      database: "postgres:17"
                      node: "22.x"
                    - php: "8.4"
                      symfony: "^7.4"
                      sylius: "~2.2.0"
                      database: "mysql:8.4"
                      node: "22.x"

        env:
            APP_ENV: test

        steps:
            -
                uses: actions/checkout@v4

            -
                name: Build Sylius Test Application
                uses: SyliusLabs/BuildTestAppAction@v4
                with:
                    e2e_js: "yes"
                    cache_key: "${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('**/composer.json') }}"
                    cache_restore_key: "${{ runner.os }}-php-${{ matrix.php }}-composer-"
                    database: "${{ matrix.database }}"
                    database_setup: "schema"
                    node_version: "${{ matrix.node }}"
                    php_version: "${{ matrix.php }}"
                    sylius_version: "${{ matrix.sylius }}"
                    symfony_version: "${{ matrix.symfony }}"

            -
                name: Validate composer.json
                run: composer validate --ansi --strict

            -
                name: Validate container
                run: vendor/bin/console lint:container

            -
                name: Run PHPStan
                run: vendor/bin/phpstan analyse -c phpstan.neon

            -
                name: Run PHPSpec
                run: vendor/bin/phpspec run --ansi -f progress --no-interaction

            -
                name: Run Behat
                run: vendor/bin/behat --colors --strict -vvv --no-interaction -f progress || vendor/bin/behat --colors --strict -vvv --no-interaction -f progress --rerun

            -
                name: Upload Behat logs
                uses: actions/upload-artifact@v4
                if: failure()
                with:
                    name: "Behat logs - Sylius ${{ matrix.sylius }} - PHP ${{ matrix.php }} - ${{ github.run_id }}"
                    path: etc/build/
                    if-no-files-found: ignore
                    compression-level: 6
                    overwrite: true
