sylius_grid:
    grids:
        tomsgu_sylius_gift_gift_option:
            driver:
                name: doctrine/orm
                options:
                    class: Tomsgu\SyliusGiftPlugin\Model\GiftOption
            fields:
                label:
                    type: string
                    label: sylius.ui.label
                channel:
                    type: twig
                    label: sylius.ui.channel
                    options:
                        template: "@SyliusAdmin/shared/grid/field/channel.html.twig"
                enabled:
                    type: twig
                    label: sylius.ui.enabled
                    options:
                        template: "@SyliusAdmin/shared/grid/field/boolean.html.twig"
            actions:
                main:
                    create:
                        type: create
                item:
                    update:
                        type: update
                    delete:
                        type: delete
